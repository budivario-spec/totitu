<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TOTITU - Bermain & Belajar</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TOTITU">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/images/logo_totitu.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Fredoka One', cursive; 
            background-image: url('assets/images/bg_totitu_pwa.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .page-container {
            padding: 20px 20px 70px 20px;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .text-shadow-bold { text-shadow: 3px 3px 0px rgba(0, 0, 0, 0.3); }

        nav {
            border-top: 0.5px solid rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            height: 60px;
            box-shadow: 0 -4px 10px rgba(0, 0, 0, 0.05);
        }

        .nav-item {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: #4b5563;
        }

        .nav-active {
            transform: scale(1.4);
            color: #f97316 !important;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="page-container">
        
        <div id="page-home" class="page-content space-y-4">
            <header class="text-center mb-6 text-white text-shadow-bold">
                <h1 class="text-3xl drop-shadow-md">TOTITU</h1>
                <p class="text-sm drop-shadow-md opacity-90">BERMAIN & BELAJAR!</p>
            </header>

            <main id="menuContainer" class="space-y-4">
                </main>
        </div>

        <div id="page-testimoni" class="page-content hidden space-y-6">
            <h2 class="text-2xl text-white text-shadow-bold text-center">CERITA MEREKA</h2>
            </div>

        <div id="page-profil" class="page-content hidden">
            </div>

    </div>

    <div id="popup-search" class="fixed inset-0 bg-black/60 z-[100] hidden flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-xs rounded-3xl p-6 shadow-2xl">
            <h3 class="text-lg text-center mb-4 text-gray-800">Cari Materi</h3>
            <input type="text" class="w-full border-2 border-orange-100 rounded-full px-4 py-2 mb-4 focus:outline-none" placeholder="Ketik di sini...">
            <button onclick="toggleSearch()" class="bg-orange-500 text-white font-bold py-2 rounded-full w-full">TUTUP</button>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 flex justify-around items-center rounded-t-3xl shadow-[0_-4px_20px_rgba(0,0,0,0.1)] z-50">
        <a href="javascript:void(0)" class="nav-item nav-active flex flex-col items-center" onclick="showPage('home', this)">
            <i class="fas fa-home text-xl"></i>        
        </a>
        <a href="javascript:void(0)" class="nav-item flex flex-col items-center" onclick="toggleSearch()">
            <i class="fas fa-search text-xl"></i>       
        </a>
        <a href="javascript:void(0)" class="nav-item flex flex-col items-center" onclick="showPage('testimoni', this)">
            <i class="fas fa-star text-xl"></i>        
        </a>
        <a href="javascript:void(0)" class="nav-item flex flex-col items-center" onclick="showPage('profil', this)">
            <i class="fas fa-user text-xl"></i>
        </a>
    </nav>

    <script>
        function showPage(pageId, element) {
            document.querySelectorAll('.page-content').forEach(page => page.classList.add('hidden'));
            document.getElementById('page-' + pageId).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('nav-active'));
            element.classList.add('nav-active');
        }

        function toggleSearch() {
            document.getElementById('popup-search').classList.toggle('hidden');
        }
    </script>

    <script src="./js/app.js"></script>
</body>
</html>
